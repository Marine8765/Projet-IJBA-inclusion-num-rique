<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique à Bordeaux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .popup-content h3 { margin-top: 0; margin-bottom: 5px; color: #2c3e50; }
        .popup-content p { margin: 5px 0; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Initialiser la carte centrée sur Bordeaux
        const map = L.map('map').setView([44.837789, -0.57918], 13);

        // Ajouter les tuiles OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Charger les données JSON
        fetch('lieux_bordeaux.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(lieu => {
                    if (lieu.latitude && lieu.longitude) {
                        const marker = L.marker([lieu.latitude, lieu.longitude]).addTo(map);
                        
                        let popupContent = `
                            <div class="popup-content">
                                <h3>${lieu.nom}</h3>
                                <p><strong>Adresse :</strong> ${lieu.adresse_brut || 'Non renseignée'}</p>
                                ${lieu.description ? `<p>${lieu.description}</p>` : ''}
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent);
                    }
                });
            })
            .catch(error => console.error('Erreur lors du chargement des données:', error));
    </script>
</body>
</html>
